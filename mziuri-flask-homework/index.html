<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Products</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f4f6f8;
            margin: 0;
            padding: 0;
        }

        .container {
            max-width: 800px;
            margin: 40px auto;
            background: #ffffff;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.08);
        }

        h1 {
            text-align: center;
            margin-bottom: 30px;
        }

        .product-card {
            display: flex;
            justify-content: space-between;
            padding: 15px 20px;
            margin-bottom: 15px;
            border-radius: 8px;
            background: #f9fafb;
            transition: 0.2s ease;
        }

        .product-card:hover {
            transform: translateY(-2px);
            background: #eef2ff;
        }

        .product-name {
            font-weight: bold;
        }

        .product-price {
            color: #4f46e5;
            font-weight: bold;
        }

        .footer {
            text-align: center;
            margin-top: 25px;
            color: #888;
            font-size: 14px;
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>🛒 Products List</h1>
            {% for product in products %}
            <div class="product-card">
                <div class="product-name">
                    {{ product.name }}
                </div>
                <div class="product-price">
                    ${{ product.price }}
                </div>
            </div>
        <div class="footer">
            Flask + Jinja2 Demo
        </div>
    </div>
</body>
</html>
